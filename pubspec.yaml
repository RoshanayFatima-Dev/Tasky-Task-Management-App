name: tasky
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"
  flutter_lints: ^3.0.0


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/tasky.jpeg"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/icon/tasky.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/icon/tasky.jpeg